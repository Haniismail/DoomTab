<svg width="128" height="128" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="50" cy="50" r="50" fill="#0D0D0D"/>
  
  <!-- Outer ring - OFF state (ghostly white-smoke) -->
  <circle cx="50" cy="50" r="38" stroke="rgba(255, 255, 255, 0.15)" stroke-width="8" fill="none" />
  
  <!-- Inner core - OFF state (faint) -->
  <circle cx="50" cy="50" r="16" fill="rgba(255, 255, 255, 0.1)" />
</svg>
